name: Deploy to Hostinger

# Builds the static export on GitHub's runners (where `next build` reliably
# produces ./out) and uploads it to Hostinger over FTP. This bypasses
# Hostinger's own build/output-detection, which couldn't locate the export.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build # output: "export" -> ./out

      - name: Deploy ./out to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Trailing slashes are required by the action.
          local-dir: ./out/
          # Hostinger primary-domain web root. If your FTP account is already
          # scoped to public_html, change this to: ./
          server-dir: public_html/
